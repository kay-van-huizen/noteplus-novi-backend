# H2 in-memory database (replaces PostgreSQL for tests)
spring.datasource.url=jdbc:h2:mem:noteplustest;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true

# Disable Flyway (PostgreSQL-specific SQL won't run on H2)
spring.flyway.enabled=false

# JWT
app.jwt.secret=test-secret-key-for-unit-tests-minimum-32chars!!
app.jwt.expiration-ms=3600000

# Disable real mail sending
spring.mail.host=localhost
spring.mail.port=3025
spring.mail.properties.mail.smtp.starttls.enable=false
spring.mail.properties.mail.smtp.auth=false

# Suppress startup banner
spring.main.banner-mode=off