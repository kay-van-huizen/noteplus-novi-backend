spring.application.name=noteplus
spring.web.resources.static-locations=classpath:/static/
spring.mvc.throw-exception-if-no-handler-found=false

spring.datasource.url=jdbc:postgresql://localhost:5432/Noteplus
spring.datasource.username=postgres
spring.datasource.password=admin
spring.datasource.driver-class-name=org.postgresql.Driver

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.placeholder-replacement=false
#spring.flyway.baseline-on-migrate=true
#spring.flyway.baseline-version=0

spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=true
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

spring.sql.init.mode=never

# Replace with: openssl rand -base64 64
app.jwt.secret=9888117e5f57c059f14d1bc002868b3ecf8387bd5c2e63a1f4d7792248c0add375e8f2ccb1cc3d3f17a7644c5f9d4bc27b49ae51a4496a86e3692675bc9ac504
app.jwt.expiration-ms=86400000

# Swagger UI settings
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.filter=true

# Never expose stack traces in API error responses
server.error.include-stacktrace=never
server.error.include-message=always
server.error.include-binding-errors=always

# File upload settings
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Directory where uploaded files are stored
file.upload-dir=uploads

# Spring Mail Mailtrap SMTP (replace with your Mailtrap credentials)
spring.mail.host=sandbox.smtp.mailtrap.io
spring.mail.port=2525
spring.mail.username=cdb5ccccc80108
spring.mail.password=0b7847ae7f36f4
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Application base URL (used in reset email links)
app.base-url=http://localhost:3000

# Password reset token expiry in minutes
app.password-reset.expiry-minutes=60